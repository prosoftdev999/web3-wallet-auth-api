name: Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create test environment file
        run: |
          cat > .env <<'EOF'
          APP_NAME=Web3 Wallet Authentication API
          DEBUG=false

          DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/web3_wallet_db

          JWT_SECRET_KEY=github-actions-test-secret-1234567890
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30

          SIWE_DOMAIN=localhost:3000
          SIWE_URI=http://localhost:3000
          SIWE_CHAIN_ID=1
          SIWE_STATEMENT=Sign in to Web3 Wallet Authentication API

          NONCE_EXPIRE_MINUTES=10

          REDIS_URL=redis://redis:6379/0

          CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
          EOF

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Docker API without cache
        run: |
          docker compose build --no-cache api

      - name: Start Docker services
        run: |
          docker compose up -d

      - name: Show container status
        run: |
          docker compose ps

      - name: Wait for API
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8001/health; then
              echo "API is ready"
              exit 0
            fi

            echo "Waiting for API: attempt ${attempt}/30"
            sleep 2
          done

          echo "API did not become ready"
          docker compose ps
          docker compose logs
          exit 1

      - name: Verify API routes
        run: |
          curl --fail --silent \
            http://localhost:8001/openapi.json \
            > openapi.json

          python - <<'PY'
          import json

          with open("openapi.json", encoding="utf-8") as file:
              schema = json.load(file)

          available_paths = set(schema.get("paths", {}))

          required_paths = {
              "/health",
              "/auth/nonce",
              "/auth/login",
              "/auth/logout",
              "/me",
          }

          print("Available API paths:")

          for path in sorted(available_paths):
              print(path)

          missing_paths = required_paths - available_paths

          if missing_paths:
              raise SystemExit(
                  f"Missing API paths: {sorted(missing_paths)}"
              )

          print("All required API paths are available.")
          PY

      - name: Run database migrations
        run: |
          docker compose exec -T api alembic upgrade head

      - name: Run tests
        run: |
          pytest -v

      - name: Show Docker logs after failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Stop Docker services
        if: always()
        run: |
          docker compose down -v